<html lang="en">

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }
        
        header {
            padding: 1rem 2rem;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        
        button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #7c3aed 0%, #2563eb 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        select {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 0.875rem;
            cursor: pointer;
        }
        
        select option {
            background: #16213e;
            color: white;
        }
        
        #network {
            flex: 1;
            width: 100%;
            background: transparent;
        }
        
        .info-panel {
            position: fixed;
            bottom: 1rem;
            left: 1rem;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 1rem;
            border-radius: 12px;
            max-width: 300px;
            font-size: 0.875rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .info-panel h3 {
            margin-bottom: 0.5rem;
            color: #00d4ff;
        }
        
        .stats {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: #7c3aed;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .legend {
            position: fixed;
            top: 5rem;
            right: 1rem;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .legend h4 {
            margin-bottom: 0.5rem;
            color: #00d4ff;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0.25rem 0;
        }
        
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        @media (max-width: 768px) {
            header {
                padding: 0.75rem 1rem;
            }
            
            h1 {
                font-size: 1.25rem;
            }
            
            .info-panel, .legend {
                max-width: calc(50% - 1.5rem);
                font-size: 0.75rem;
            }
            
            .legend {
                top: auto;
                bottom: 1rem;
                right: 1rem;
            }
        }
    </style>
</head>

                    <option value="radial">Radial</option>
                </select>
                <button class="btn-secondary" onclick="network.fit()">Fit View</button>
                <button class="btn-primary" onclick="togglePhysics()">Toggle Physics</button>
            </div>
        </header>
        <div id="network"></div>
    </div>
    
    <div class="info-panel">

            1: '#e91e63',  // Root - Pink
            2: '#9c27b0',  // Chapters - Purple
            3: '#3f51b5',  // Sections - Indigo
            4: '#00bcd4',  // Root diagnoses - Cyan
            5: '#4caf50'   // Specific diagnoses - Green
        };
        
        // Process nodes with colors and sizes
        const nodes = new vis.DataSet(nodesData.map(node => ({
            ...node,
            color: {
                background: levelColors[node.level] || '#607d8b',
                border: levelColors[node.level] || '#607d8b',
                highlight: {
                    background: '#ffffff',
                    border: levelColors[node.level] || '#607d8b'
                }
            },
            font: {
                color: '#ffffff',
                size: Math.max(12, 20 - node.level * 2)
            },
            size: node.value
        })));
        
        const edges = new vis.DataSet(edgesData.map(edge => ({
            ...edge,
            color: {
                color: 'rgba(255, 255, 255, 0.3)',
                highlight: '#00d4ff'
            },
            width: 1
        })));
        
        // Update stats
        document.getElementById('node-count').textContent = nodes.length;
        document.getElementById('edge-count').textContent = edges.length;
        
        // Network configuration
        const container = document.getElementById('network');
        const data = { nodes, edges };
        
        const hierarchicalOptions = {
            layout: {
                hierarchical: {
                    enabled: true,
                    direction: 'UD',
                    sortMethod: 'directed',
                    levelSeparation: 150,
                    nodeSpacing: 100,
                    treeSpacing: 200
                }
            },
            physics: {
                enabled: false
            },
            interaction: {
                hover: true,
                tooltipDelay: 100,
                zoomView: true,
                dragView: true,
                navigationButtons: true
            },
            nodes: {
                shape: 'dot',
                borderWidth: 2,
                shadow: true
            },
            edges: {
                smooth: {
                    type: 'cubicBezier',
                    forceDirection: 'vertical'
                }
            }
        };
        
        const forceOptions = {
            layout: {
                hierarchical: {
                    enabled: false
                }
            },
            physics: {
                enabled: true,
                solver: 'forceAtlas2Based',
                forceAtlas2Based: {
                    gravitationalConstant: -50,
                    centralGravity: 0.01,
                    springLength: 100,
                    springConstant: 0.08
                },
                stabilization: {
                    iterations: 200
                }
            },
            interaction: {
                hover: true,
                tooltipDelay: 100,
                zoomView: true,
                dragView: true,
                hideEdgesOnDrag: true,
                navigationButtons: true
            },
            nodes: {
                shape: 'dot',
                borderWidth: 2,
                shadow: true
            },
            edges: {
                smooth: {
                    type: 'continuous'
                }
            }
        };
        
        const radialOptions = {
            layout: {
                hierarchical: {
                    enabled: true,
                    direction: 'DU',
                    sortMethod: 'directed',
                    levelSeparation: 200,
                    nodeSpacing: 150,
                    treeSpacing: 250
                }
            },
            physics: {
                enabled: false
            },
            interaction: {
                hover: true,
                tooltipDelay: 100,
                zoomView: true,
                dragView: true,
                navigationButtons: true
            },
            nodes: {
                shape: 'dot',
                borderWidth: 2,
                shadow: true
            },
            edges: {
                smooth: {
                    type: 'curvedCW',
                    roundness: 0.2
                }
            }
        };
        
        // Initialize network
        let network = new vis.Network(container, data, hierarchicalOptions);
        let physicsEnabled = false;
        
        // Layout switcher
        document.getElementById('layout-select').addEventListener('change', function(e) {
            const layout = e.target.value;
            let options;
            
            switch(layout) {
                case 'hierarchical':
                    options = hierarchicalOptions;
                    break;
                case 'force':
                    options = forceOptions;
                    physicsEnabled = true;
                    break;
                case 'radial':
                    options = radialOptions;
                    break;
                default:
                    options = hierarchicalOptions;
            }
            
            network.setOptions(options);
            
            // Re-fit after layout change
            setTimeout(() => network.fit(), 500);
        });
        
        // Toggle physics
        function togglePhysics() {
            physicsEnabled = !physicsEnabled;
            network.setOptions({ physics: { enabled: physicsEnabled } });
        }
        
        // Double-click to focus on node
        network.on('doubleClick', function(params) {
            if (params.nodes.length > 0) {
                network.focus(params.nodes[0], {
                    scale: 1.5,
                    animation: {
                        duration: 500,
                        easingFunction: 'easeInOutQuad'
                    }
                });
            }
        });
        
        // Fit network on load
        network.once('stabilized', function() {
            network.fit();
        });
    </script>
